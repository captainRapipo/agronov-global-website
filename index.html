<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AGRONOV Global</title>

  <meta name="description" content="AGRONOV Global — visit our official Amazon store." />
  <meta name="theme-color" content="#ffffff" />
  <meta property="og:title" content="AGRONOV Global" />
  <meta property="og:description" content="Visit our official store." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://agronovglobal.com/" />

  <!-- Favicons -->
  <link rel="icon" type="image/svg+xml" href="favicon.svg?v=2" />
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png?v=2" />
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png?v=2" />
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png?v=2" />

  <!-- Typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700&display=swap" rel="stylesheet" />

  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --ink: #11131a;
      --muted: #5a5f6b;
      --line: #e7e8ec;
      --accent: #ff9900;
      --bg: #ffffff;
    }

    html,
    body {
      height: 100%;
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: "Plus Jakarta Sans", system-ui, -apple-system, "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased;
      display: flex;
      min-height: 100dvh;
      flex-direction: column;
      align-items: center;
      padding: 40px 24px;
      text-align: center;
      overflow-x: hidden;
    }

    main {
      flex: 1 1 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 48px;
      width: 100%;
      max-width: 720px;
    }

    /* Logo */
    .logo {
      width: min(620px, 86vw);
      max-width: 100%;
      height: auto;
      transform-origin: center;
      animation: logo-in 1s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes logo-in {
      0% {
        opacity: 0;
        transform: translateY(18px) scale(0.94);
        filter: blur(6px);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
        filter: blur(0);
      }
    }

    /* Each glyph + the dot draw/fade in sequentially */
    .logo g g {
      opacity: 0;
      animation: glyph-in 0.55s ease forwards;
    }

    .logo g g:nth-child(1) { animation-delay: 0.15s; }
    .logo g g:nth-child(2) { animation-delay: 0.22s; }
    .logo g g:nth-child(3) { animation-delay: 0.29s; }
    .logo g g:nth-child(4) { animation-delay: 0.36s; }
    .logo g g:nth-child(5) { animation-delay: 0.43s; }
    .logo g g:nth-child(6) { animation-delay: 0.50s; }
    .logo g g:nth-child(7) { animation-delay: 0.57s; }
    .logo g g:nth-child(8) { animation-delay: 0.64s; }
    .logo g g:nth-child(9) { animation-delay: 0.71s; }
    .logo g g:nth-child(10) { animation-delay: 0.78s; }
    .logo g g:nth-child(11) { animation-delay: 0.85s; }
    .logo g g:nth-child(12) { animation-delay: 0.92s; }
    .logo g g:nth-child(13) { animation-delay: 0.99s; }
    .logo g g:nth-child(14) { animation-delay: 1.12s; }

    @keyframes glyph-in {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .logo .wm {
      fill: var(--ink);
    }

    .logo .wm-dim {
      fill: #8a8f9b;
    }

    .logo .wm-dot {
      fill: var(--accent);
    }

    /* Footer */
    footer {
      flex: 0 0 auto;
      width: 100%;
      max-width: 820px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 22px;
      margin-top: 48px;
      animation: fade-up 0.8s ease 1.3s both;
    }

    /* Store link */
    .store-link {
      display: inline-flex;
      align-items: center;
      gap: 11px;
      color: var(--accent);
      text-decoration: none;
      font-weight: 700;
      font-size: 1.02rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      transition: color 0.16s ease, gap 0.16s ease;
    }

    .store-link:hover {
      color: #e88a00;
      gap: 14px;
    }

    .store-link svg {
      width: 17px;
      height: 17px;
      flex-shrink: 0;
    }

    .footer-divider {
      width: 100%;
      height: 1px;
      background: var(--line);
    }

    @keyframes fade-up {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .contact {
      display: flex;
      flex-wrap: nowrap;
      align-items: center;
      justify-content: center;
      gap: 22px;
    }

    .contact-item span:last-child {
      white-space: nowrap;
    }

    .contact-item {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      text-decoration: none;
      font-size: 0.98rem;
      font-weight: 500;
      transition: color 0.16s ease;
    }

    .contact-item:hover {
      color: var(--ink);
    }

    .contact-item svg {
      width: 17px;
      height: 17px;
      color: var(--accent);
      flex-shrink: 0;
    }

    .contact-sep {
      color: var(--line);
      font-size: 0.9rem;
      user-select: none;
    }

    .brand-name {
      font-size: 0.82rem;
      font-weight: 500;
      letter-spacing: 0.01em;
      color: #9aa0ac;
    }

    @media (max-width: 760px) {
      .contact-sep { display: none; }
      .contact { flex-direction: column; gap: 16px; }
    }

    /* Respect users who prefer reduced motion */
    @media (prefers-reduced-motion: reduce) {
      .logo,
      .logo g g,
      .logo .wm-dot,
      footer {
        animation: none !important;
        opacity: 1 !important;
        filter: none !important;
        transform: none !important;
      }
    }
  </style>
</head>
