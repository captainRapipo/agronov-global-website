<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AGRONOV Global</title>

  <meta name="description" content="AGRONOV Global — Amazon brand partners. Explore our storefront." />
  <meta name="theme-color" content="#f6c98b" />
  <meta property="og:title" content="AGRONOV Global" />
  <meta property="og:description" content="Your brand, riding the global tide. Explore our storefront." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://agronovglobal.com/" />

  <!-- Favicons -->
  <link rel="icon" type="image/svg+xml" href="favicon.svg?v=2" />
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png?v=2" />
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png?v=2" />
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png?v=2" />

  <!-- Typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@1,9..144,500;1,9..144,600&family=Plus+Jakarta+Sans:wght@500;600;700&display=swap"
    rel="stylesheet" />

  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --ink: #08323f;
      --ink-soft: #2a5a67;
      --accent: #ff9900;
      --glass: rgba(255, 255, 255, 0.24);
      --glass-brd: rgba(255, 255, 255, 0.5);
    }

    html,
    body {
      height: 100%;
    }

    body {
      margin: 0;
      overflow: hidden;
      background: #f6c98b;
      color: var(--ink);
      font-family: "Plus Jakarta Sans", system-ui, -apple-system, "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* Ambient seascape */
    #scene-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      display: block;
    }

    /* Cinematic scrim for depth + text legibility */
    .scrim {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background:
        radial-gradient(120% 90% at 50% 42%, transparent 55%, rgba(4, 40, 55, 0.28) 100%),
        linear-gradient(180deg, rgba(255, 244, 224, 0.12) 0%, transparent 26%);
    }

    /* Logo — top right, frosted */
    .logo-badge {
      position: fixed;
      top: 22px;
      left: 26px;
      z-index: 4;
      display: flex;
      align-items: center;
      padding: 12px 20px;
      border-radius: 999px;
      background: var(--glass);
      border: 1px solid var(--glass-brd);
      backdrop-filter: blur(14px) saturate(1.1);
      -webkit-backdrop-filter: blur(14px) saturate(1.1);
      box-shadow: 0 12px 34px rgba(4, 50, 70, 0.18);
      animation: drop-in 0.9s cubic-bezier(0.22, 1, 0.36, 1) 0.1s both;
    }

    .logo-badge .logo {
      width: min(240px, 52vw);
      height: auto;
      display: block;
    }

    .logo .wm { fill: #0c2f3a; }
    .logo .wm-dim { fill: #5f7c86; }
    .logo .wm-dot { fill: var(--accent); }

    @keyframes drop-in {
      from { opacity: 0; transform: translateY(-16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Content stage */
    .stage {
      position: relative;
      z-index: 2;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 120px 24px 48px;
    }

    .card {
      width: 100%;
      max-width: 680px;
      text-align: center;
      padding: 44px 48px 36px;
      border-radius: 30px;
      background: rgba(255, 255, 255, 0.22);
      border: 1px solid rgba(255, 255, 255, 0.46);
      backdrop-filter: blur(18px) saturate(1.15);
      -webkit-backdrop-filter: blur(18px) saturate(1.15);
      box-shadow:
        0 30px 70px rgba(4, 46, 64, 0.28),
        inset 0 1px 0 rgba(255, 255, 255, 0.6);
      animation: rise-in 1s cubic-bezier(0.22, 1, 0.36, 1) 0.35s both;
    }

    @keyframes rise-in {
      from { opacity: 0; transform: translateY(26px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .eyebrow {
      font-size: 0.74rem;
      font-weight: 700;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--ink-soft);
      margin-bottom: 14px;
    }

    .tagline {
      font-family: "Fraunces", Georgia, serif;
      font-style: italic;
      font-weight: 500;
      font-size: clamp(1.3rem, 3.1vw, 1.9rem);
      line-height: 1.2;
      color: var(--ink);
      margin-bottom: 30px;
      white-space: nowrap;
      text-shadow: 0 1px 0 rgba(255, 255, 255, 0.4);
    }

    /* Store CTA */
    .store-link {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 15px 30px;
      border-radius: 999px;
      background: var(--accent);
      color: #3d2400;
      text-decoration: none;
      font-weight: 700;
      font-size: 0.98rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      box-shadow: 0 14px 30px rgba(255, 153, 0, 0.4);
      transition: transform 0.18s ease, box-shadow 0.18s ease, gap 0.18s ease;
    }

    .store-link:hover {
      transform: translateY(-2px);
      gap: 15px;
      box-shadow: 0 20px 40px rgba(255, 153, 0, 0.5);
    }

    .store-link:active { transform: translateY(0); }

    .store-link svg {
      width: 17px;
      height: 17px;
      flex-shrink: 0;
    }

    .divider {
      width: 100%;
      height: 1px;
      background: rgba(8, 50, 63, 0.18);
      margin: 30px 0 22px;
    }

    .contact {
      display: flex;
      flex-wrap: nowrap;
      align-items: center;
      justify-content: center;
      gap: 18px;
    }

    .contact-item {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      color: var(--ink-soft);
      text-decoration: none;
      font-size: 0.92rem;
      font-weight: 600;
      transition: color 0.16s ease;
    }

    .contact-item span:last-child { white-space: nowrap; }
    .contact-item:hover { color: var(--ink); }

    .contact-item svg {
      width: 16px;
      height: 16px;
      color: var(--accent);
      flex-shrink: 0;
    }

    .contact-sep {
      color: rgba(8, 50, 63, 0.25);
      user-select: none;
    }

    /* Copyright — pinned to the bottom of the page */
    .page-footer {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 16px;
      z-index: 3;
      text-align: center;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: rgba(255, 255, 255, 0.85);
      text-shadow: 0 1px 8px rgba(3, 50, 70, 0.55);
      pointer-events: none;
      animation: fade-in 1s ease 1.2s both;
    }

    @keyframes fade-in {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* Pudgy mascots riding the tide */
    .pudgy {
      position: fixed;
      bottom: clamp(6px, 3vh, 42px);
      width: clamp(118px, 15vw, 188px);
      z-index: 3;
      pointer-events: none;
      filter: drop-shadow(0 14px 12px rgba(3, 60, 90, 0.3));
    }

    .pudgy-left { left: clamp(6px, 3vw, 54px); transform: scaleX(-1); }
    .pudgy-right { right: clamp(6px, 3vw, 54px); }

    .pudgy .rider {
      display: block;
      width: 100%;
      height: auto;
      transform-origin: 50% 82%;
      animation: ride 4.6s ease-in-out infinite;
    }

    .pudgy-right .rider { animation-delay: -2.3s; }

    @keyframes ride {
      0%, 100% { transform: translateY(0) rotate(-2.5deg); }
      50% { transform: translateY(-9px) rotate(2.5deg); }
    }

    @media (max-width: 720px) {
      .logo-badge {
        top: 16px;
        right: 50%;
        transform: translateX(50%);
        padding: 10px 18px;
      }
      .logo-badge .logo { width: min(220px, 62vw); }
      @keyframes drop-in {
        from { opacity: 0; transform: translateX(50%) translateY(-16px); }
        to { opacity: 1; transform: translateX(50%) translateY(0); }
      }
      .stage { padding: 104px 18px 96px; }
      .card { padding: 32px 24px 28px; max-width: 440px; }
      .tagline { white-space: normal; }
      .contact-sep { display: none; }
      .contact { flex-direction: column; gap: 15px; }
      .pudgy { width: clamp(84px, 27vw, 128px); bottom: 4px; }
      .pudgy-left { left: 2px; }
      .pudgy-right { right: 2px; }
    }

    @media (prefers-reduced-motion: reduce) {
      .logo-badge,
      .card,
      .page-footer {
        animation: none !important;
        opacity: 1 !important;
        transform: none !important;
      }
      .pudgy .rider { animation: none !important; }
      @media (max-width: 720px) {
        .logo-badge { transform: translateX(50%) !important; }
      }
    }
  </style>
</head>
