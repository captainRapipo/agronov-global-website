<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AGRONOV Global</title>

  <meta name="description" content="Dive into the storefront where brands go global." />
  <meta name="theme-color" content="#f6c98b" />
  <meta property="og:title" content="AGRONOV Global" />
  <meta property="og:description" content="Dive into the storefront where brands go global." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://agronovglobal.com/" />

  <!-- Favicons -->
  <link rel="icon" type="image/svg+xml" href="favicon.svg?v=4" />
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png?v=4" />
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png?v=4" />
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png?v=4" />

  <!-- Typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap"
    rel="stylesheet" />

  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --ink: #08323f;
      --ink-soft: #2a5a67;
      --accent: #ff9900;
      --glass: rgba(255, 255, 255, 0.24);
      --glass-brd: rgba(255, 255, 255, 0.5);
    }

    html,
    body {
      height: 100%;
    }

    body {
      margin: 0;
      overflow: hidden;
      background: #f6c98b;
      color: var(--ink);
      font-family: "Plus Jakarta Sans", system-ui, -apple-system, "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* Ambient seascape */
    #scene-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      display: block;
    }

    /* Cinematic scrim for depth + text legibility */
    .scrim {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background:
        radial-gradient(120% 90% at 50% 42%, transparent 55%, rgba(4, 40, 55, 0.28) 100%),
        linear-gradient(180deg, rgba(255, 244, 224, 0.12) 0%, transparent 26%);
    }

    /* Logo — top right, frosted */
    .logo-badge {
      position: fixed;
      top: 22px;
      left: 26px;
      z-index: 4;
      display: flex;
      align-items: center;
      padding: 12px 20px;
      border-radius: 999px;
      background: var(--glass);
      border: 1px solid var(--glass-brd);
      backdrop-filter: blur(14px) saturate(1.1);
      -webkit-backdrop-filter: blur(14px) saturate(1.1);
      box-shadow: 0 12px 34px rgba(4, 50, 70, 0.18);
      animation: drop-in 0.9s cubic-bezier(0.22, 1, 0.36, 1) 0.1s both;
    }

    .logo-badge .logo {
      width: min(240px, 52vw);
      height: auto;
      display: block;
    }

    .logo .wm { fill: #0a0a0a; }
    .logo .wm-dim { fill: url(#logo-trop); }
    .logo .wm-dot { fill: var(--accent); }

    @keyframes drop-in {
      from { opacity: 0; transform: translateY(-16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Content stage */
    .stage {
      position: relative;
      z-index: 2;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 120px 24px 48px;
    }

    .card {
      width: 100%;
      max-width: 760px;
      text-align: center;
      padding: 44px 48px 36px;
      border-radius: 30px;
      background: rgba(255, 255, 255, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(18px) saturate(1.15);
      -webkit-backdrop-filter: blur(18px) saturate(1.15);
      box-shadow:
        0 30px 70px rgba(4, 46, 64, 0.28),
        inset 0 1px 0 rgba(255, 255, 255, 0.6);
      animation: rise-in 1s cubic-bezier(0.22, 1, 0.36, 1) 0.35s both;
    }

    @keyframes rise-in {
      from { opacity: 0; transform: translateY(26px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .eyebrow {
      font-size: 0.74rem;
      font-weight: 700;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--ink-soft);
      margin-bottom: 14px;
    }

    .tagline {
      font-family: "Poppins", system-ui, sans-serif;
      font-weight: 600;
      font-size: clamp(1.45rem, 3.3vw, 2rem);
      line-height: 1.25;
      letter-spacing: -0.005em;
      color: #0a3a49;
      margin: 4px 0 30px;
      white-space: nowrap;
    }

    /* Store CTA */
    .store-link {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 16px 32px;
      border-radius: 999px;
      background: linear-gradient(180deg, #ffa521 0%, #f28a00 100%);
      color: #1b1205;
      text-decoration: none;
      font-weight: 800;
      font-size: 0.98rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      box-shadow: 0 14px 30px rgba(240, 138, 0, 0.42);
      transition: transform 0.18s ease, box-shadow 0.18s ease, gap 0.18s ease;
    }

    .store-link:hover {
      transform: translateY(-2px);
      gap: 15px;
      box-shadow: 0 20px 40px rgba(255, 153, 0, 0.5);
    }

    .store-link:active { transform: translateY(0); }

    .store-link svg {
      width: 17px;
      height: 17px;
      flex-shrink: 0;
    }

    .divider {
      width: 100%;
      height: 1px;
      background: rgba(8, 50, 63, 0.28);
      margin: 30px 0 22px;
    }

    .contact {
      display: flex;
      flex-wrap: nowrap;
      align-items: center;
      justify-content: center;
      gap: 18px;
    }

    .contact-item {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      color: var(--ink);
      text-decoration: none;
      font-size: 0.94rem;
      font-weight: 700;
      transition: color 0.16s ease;
    }

    .contact-item span:last-child { white-space: nowrap; }
    .contact-item:hover { color: var(--ink); }

    .contact-item svg {
      width: 16px;
      height: 16px;
      color: var(--accent);
      flex-shrink: 0;
    }

    .contact-sep {
      color: rgba(8, 50, 63, 0.4);
      user-select: none;
    }

    /* WhatsApp menu (Call / Message) */
    .wa { position: relative; }
    .wa summary {
      list-style: none;
      cursor: pointer;
    }
    .wa summary::-webkit-details-marker { display: none; }
    .wa-ico {
      width: 17px;
      height: 17px;
      fill: #25d366;
      flex-shrink: 0;
    }
    .wa-pop {
      position: absolute;
      left: 50%;
      bottom: calc(100% + 12px);
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 196px;
      padding: 8px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(255, 255, 255, 0.7);
      box-shadow: 0 18px 40px rgba(3, 50, 70, 0.3);
      z-index: 5;
    }
    .wa-pop::after {
      content: "";
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      border: 7px solid transparent;
      border-top-color: rgba(255, 255, 255, 0.92);
    }
    .wa-opt {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 11px;
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--ink);
      white-space: nowrap;
      transition: background 0.14s ease;
    }
    .wa-opt:hover { background: rgba(8, 50, 63, 0.09); }
    .wa-opt svg { width: 17px; height: 17px; flex-shrink: 0; }
    .wa-opt .i-call { color: var(--accent); }
    .wa-opt .i-msg { fill: #25d366; }
    .wa-opt small {
      display: block;
      font-weight: 500;
      font-size: 0.76rem;
      color: var(--ink-soft);
    }

    /* Copyright — pinned to the bottom of the page */
    .page-footer {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 16px;
      z-index: 3;
      text-align: center;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: rgba(255, 255, 255, 0.85);
      text-shadow: 0 1px 8px rgba(3, 50, 70, 0.55);
      pointer-events: none;
      animation: fade-in 1s ease 1.2s both;
    }

    @keyframes fade-in {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* Pudgy mascots cruising the tide */
    .pudgy {
      position: fixed;
      left: 0;
      bottom: clamp(4px, 2.5vh, 30px);
      width: clamp(118px, 14vw, 178px);
      z-index: 3;
      pointer-events: none;
      filter: drop-shadow(0 14px 12px rgba(3, 60, 90, 0.3));
      will-change: transform;
    }

    /* four jet-skis flowing across the water at staggered depths */
    .pudgy-a { animation: cruise-lr 17s linear infinite; }
    .pudgy-b {
      bottom: clamp(120px, 22vh, 188px);
      width: clamp(70px, 8vw, 106px);
      opacity: 0.88;
      animation: cruise-rl 25s linear infinite;
    }
    .pudgy-c {
      bottom: clamp(72px, 15vh, 138px);
      width: clamp(88px, 10vw, 128px);
      opacity: 0.93;
      animation: cruise-rl 21s linear infinite;
      animation-delay: -9s;
    }
    .pudgy-d {
      bottom: clamp(38px, 8vh, 82px);
      width: clamp(104px, 12vw, 150px);
      opacity: 0.97;
      animation: cruise-lr 19s linear infinite;
      animation-delay: -6s;
    }

    /* motion only — pure horizontal travel */
    @keyframes cruise-lr {
      from { transform: translateX(-260px); }
      to { transform: translateX(calc(100vw + 110px)); }
    }
    @keyframes cruise-rl {
      from { transform: translateX(calc(100vw + 110px)); }
      to { transform: translateX(-260px); }
    }

    /* facing — kept separate from motion so travel direction stays correct.
       The gif faces left by default, so mirror the right-bound riders. */
    .pudgy .face { display: block; }
    /* Sprite's default nose/hull points right, so mirror the LEFT-bound
       lanes to make the jet-ski lead its travel direction. */
    .pudgy-b .face,
    .pudgy-c .face { transform: scaleX(-1); }

    .pudgy .rider {
      display: block;
      width: 100%;
      height: auto;
      transform-origin: 50% 82%;
      animation: bob 3.6s ease-in-out infinite;
    }

    .pudgy-b .rider { animation-delay: -1.8s; }
    .pudgy-c .rider { animation-delay: -3s; }
    .pudgy-d .rider { animation-delay: -2.4s; }

    @keyframes bob {
      0%, 100% { transform: translateY(0) rotate(-2deg); }
      50% { transform: translateY(-7px) rotate(2deg); }
    }

    @media (max-width: 720px) {
      .logo-badge {
        top: 16px;
        right: 50%;
        transform: translateX(50%);
        padding: 10px 18px;
      }
      .logo-badge .logo { width: min(220px, 62vw); }
      @keyframes drop-in {
        from { opacity: 0; transform: translateX(50%) translateY(-16px); }
        to { opacity: 1; transform: translateX(50%) translateY(0); }
      }
      .stage { padding: 104px 18px 96px; }
      .card { padding: 32px 24px 28px; max-width: 440px; }
      .tagline { white-space: normal; }
      .contact-sep { display: none; }
      .contact { flex-direction: column; gap: 15px; }
      .pudgy { width: clamp(72px, 22vw, 112px); }
      .pudgy-b { bottom: clamp(120px, 26vh, 220px); width: clamp(48px, 13vw, 74px); }
      .pudgy-c { bottom: clamp(70px, 16vh, 140px); width: clamp(60px, 16vw, 92px); }
      .pudgy-d { bottom: clamp(36px, 9vh, 80px); width: clamp(66px, 18vw, 100px); }
    }

    @media (prefers-reduced-motion: reduce) {
      .logo-badge,
      .card,
      .page-footer {
        animation: none !important;
        opacity: 1 !important;
        transform: none !important;
      }
      .pudgy,
      .pudgy .rider { animation: none !important; }
      .pudgy-a { left: clamp(6px, 3vw, 48px); transform: none !important; }
      .pudgy-b { left: auto; right: clamp(6px, 3vw, 48px); transform: none !important; }
      .pudgy-c { left: 33%; transform: translateX(-50%) !important; }
      .pudgy-d { left: 67%; transform: translateX(-50%) !important; }
      @media (max-width: 720px) {
        .logo-badge { transform: translateX(50%) !important; }
      }
    }
  </style>
</head>
